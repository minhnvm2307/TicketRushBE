services:
  api:
    build: .
    env_file:
      - .env
    environment:
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-http}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-http://embedding:80}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-5}
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - api_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_started
      prometheus:
        condition: service_started
    restart: unless-stopped
    networks:
      - ticketrush-net

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command:
      - --model-id
      - sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - --port
      - "80"
    environment:
      HF_HOME: /data
    volumes:
      - hf_cache:/data
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - ticketrush-net

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ticketrush
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./app/db/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketrush"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketrush-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketrush-net

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - ticketrush-net

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ticketrush-net

volumes:
  pg_data:
  hf_cache:
  api_venv:

networks:
  ticketrush-net:
    driver: bridge
